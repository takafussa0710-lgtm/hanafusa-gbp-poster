name: GBP daily post

on:
  schedule:
    # 毎日 09:07 JST（=00:07 UTC）。00分はGitHubが混雑し遅延が大きいため半端な分に設定。
    - cron: "7 0 * * *"
  workflow_dispatch: {}

# 投稿ロジックは posts/schedule.json（曜日×週）＋ posts/content.json（テーマ本文）。
# 2026-07-13 起点。開始前の日付・日曜・休診(水:江坂/ラボ)は表側のnullで自動的に投稿なし。
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: スケジュール投稿
        env:
          GBP_CLIENT_ID:     ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          LOC_SENRICHUO:     ${{ secrets.LOC_SENRICHUO }}
          LOC_ESAKA:         ${{ secrets.LOC_ESAKA }}
          LOC_MINOH:         ${{ secrets.LOC_MINOH }}
          LOC_LAB:           ${{ secrets.LOC_LAB }}
          IMAGES_BASE_URL:   ${{ secrets.IMAGES_BASE_URL }}
        run: python post_scheduled.py
