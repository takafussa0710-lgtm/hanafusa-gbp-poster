name: GBP daily post

on:
  schedule:
    # 毎日 09:00 JST（=00:00 UTC）に実行。時刻を変えたい場合は cron を編集（UTC基準）
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # 手動テスト実行も可能（Actionsタブから Run workflow）

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 投稿スクリプト実行
        env:
          GBP_CLIENT_ID:     ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          LOC_SENRICHUO:     ${{ secrets.LOC_SENRICHUO }}
          LOC_ESAKA:         ${{ secrets.LOC_ESAKA }}
          LOC_MINOH:         ${{ secrets.LOC_MINOH }}
          LOC_LAB:           ${{ secrets.LOC_LAB }}
          IMAGES_BASE_URL:   ${{ secrets.IMAGES_BASE_URL }}
        run: |
          TODAY=$(date -u +%F)
          # キャンペーン投稿のみの日は、全拠点の日替わりをスキップ
          case "$TODAY" in
            2026-07-08|2026-07-09|2026-07-10)
              echo "$TODAY: キャンペーン日のため通常の日替わり投稿は全拠点スキップ"
              exit 0
              ;;
          esac
          python post_to_gbp.py
# 追加ライブラリ不要（Python標準ライブラリのみ）。pip install は不要です。
