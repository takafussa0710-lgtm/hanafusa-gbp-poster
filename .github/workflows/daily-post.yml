name: GBP daily post

on:
  schedule:
    # 毎日 07:07 JST（=22:07 UTC）に起動し、下の待機ステップで 09:00 JST まで待ってから投稿。
    # GitHub の schedule は遅延するため（実測で最大3時間超）、早めに起動して着地時刻を安定させる。
    - cron: "7 22 * * *"
  workflow_dispatch: {}

# 投稿ロジックは posts/schedule.json（曜日×週）＋ posts/content.json（テーマ本文）。
# 2026-07-13 起点。開始前の日付・日曜・休診(水:江坂/ラボ)は表側のnullで自動的に投稿なし。
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: 09:02 JST まで待機（早く起動した分はここで吸収。手動実行時は待たない）
        if: github.event_name == 'schedule'
        run: |
          target=$(TZ=Asia/Tokyo date -d "09:02" +%s)
          now=$(date +%s)
          if [ "$now" -lt "$target" ]; then
            echo "09:02 JST まで $((target - now)) 秒待機します"
            sleep $((target - now))
          else
            echo "既に 09:02 JST を過ぎているため待機なしで投稿します"
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: スケジュール投稿
        env:
          GBP_CLIENT_ID:     ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          LOC_SENRICHUO:     ${{ secrets.LOC_SENRICHUO }}
          LOC_ESAKA:         ${{ secrets.LOC_ESAKA }}
          LOC_MINOH:         ${{ secrets.LOC_MINOH }}
          LOC_LAB:           ${{ secrets.LOC_LAB }}
          IMAGES_BASE_URL:   ${{ secrets.IMAGES_BASE_URL }}
        run: python post_scheduled.py
