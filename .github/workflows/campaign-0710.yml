name: Campaign 7/10 (粉瘤3院/ラボ ゼオスキン) 単発

# 2026-07-10 09:00 JST の投稿：千里中央・江坂・箕面=粉瘤／ラボ=ゼオスキン。
# この日は日替わり投稿を全拠点スキップ（daily-post.yml側で制御）。実行後は削除OK。
on:
  schedule:
    - cron: "7 0 10 7 *"     # 毎年7月10日 00:00 UTC = 09:00 JST（今回は2026/7/10が対象）
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 7/10投稿（粉瘤3院／ラボ ゼオスキン）
        env:
          GBP_CLIENT_ID:     ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          LOC_SENRICHUO:     ${{ secrets.LOC_SENRICHUO }}
          LOC_ESAKA:         ${{ secrets.LOC_ESAKA }}
          LOC_MINOH:         ${{ secrets.LOC_MINOH }}
          LOC_LAB:           ${{ secrets.LOC_LAB }}
          IMAGES_BASE_URL:   ${{ secrets.IMAGES_BASE_URL }}
        run: python post_campaign.py posts/campaign_0710.json
